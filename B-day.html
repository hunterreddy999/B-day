<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Krishna 🎉</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 90%;
    }

    h1 {
      font-size: 2.5rem;
    }

    #countdown {
      font-size: 1.5rem;
      margin: 15px 0;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #ff6f91;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff6f91;
      color: white;
    }

    #surprise {
      display: none;
      margin-top: 20px;
      font-size: 1.2rem;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      #countdown { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>🎂 Happy Birthday Krishna 🎉</h1>
  <p>Something special is coming...</p>

  <div id="countdown"></div>

  <button onclick="showSurprise()">Open Surprise 🎁</button>

  <div id="surprise">
    💖 Dear Krishna,  
    <br><br>
    May your day be filled with happiness, laughter, and everything you love!  
    You are truly special and deserve the best 🎉  
    <br><br>
    🎊 Enjoy your day to the fullest! 🎂
  </div>
</div>

<script>
  // 🎯 SET YOUR BIRTHDAY DATE HERE (YYYY-MM-DD)
  const birthday = new Date("2026-04-06T00:00:00").getTime();

  const countdownEl = document.getElementById("countdown");

  const timer = setInterval(() => {
    const now = new Date().getTime();
    const diff = birthday - now;

    if (diff <= 0) {
      countdownEl.innerHTML = "🎉 It's Krishna's Birthday Today!";
      startConfetti();
      clearInterval(timer);
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    countdownEl.innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }, 1000);

  function showSurprise() {
    document.getElementById("surprise").style.display = "block";
    startConfetti();
  }

  // 🎊 Confetti
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let confetti = [];

  function randomColor() {
    const colors = ["#ff6f91","#ff9671","#ffc75f","#f9f871","#6bcB77","#4d96ff"];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function createConfetti() {
    confetti = [];
    for (let i = 0; i < 150; i++) {
      confetti.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 50,
        color: randomColor()
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach(c => {
      ctx.fillStyle = c.color;
      ctx.fillRect(c.x, c.y, c.r, c.r);
    });

    updateConfetti();
  }

  function updateConfetti() {
    confetti.forEach(c => {
      c.y += 2;
      c.x += Math.sin(c.d);

      if (c.y > canvas.height) {
        c.y = -10;
        c.x = Math.random() * canvas.width;
      }
    });
  }

  function startConfetti() {
    createConfetti();
    setInterval(drawConfetti, 20);
  }

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
